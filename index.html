<div id="particles"></div>

<style>
#particles {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
}

.particle {
    position: absolute;
    color: #ff6b6b;
    font-size: 20px;
    animation: fall linear infinite;
    opacity: 0.6;
}

@keyframes fall {
    0% {
        transform: translateY(-10vh) rotate(0deg);
        opacity: 0.6;
    }
    100% {
        transform: translateY(110vh) rotate(360deg);
        opacity: 0;
    }
}
</style>

<script>
// Падающие частицы
function createParticle() {
    const particle = document.createElement('div');
    particle.className = 'particle';
    particle.innerHTML = ['🌸', '💕', '💗', '💖', '🎀', '✨', '💜'][Math.floor(Math.random() * 7)];
    particle.style.left = Math.random() * 100 + '%';
    particle.style.fontSize = (Math.random() * 20 + 10) + 'px';
    particle.style.animationDuration = (Math.random() * 5 + 5) + 's';
    particle.style.animationDelay = Math.random() * 5 + 's';
    document.getElementById('particles').appendChild(particle);
    
    setTimeout(() => particle.remove(), 10000);
}

setInterval(createParticle, 500);

// ===== ИЗБРАННОЕ (СОХРАНЕНИЕ В localStorage) =====

let favorites = [];

// Загрузка избранного из localStorage
function loadFavorites() {
    const saved = localStorage.getItem('hentai_favorites');
    if (saved) {
        favorites = JSON.parse(saved);
    }
    updateFavCount();
    renderFavoritesGrid();
}

// Сохранение избранного в localStorage
function saveFavorites() {
    localStorage.setItem('hentai_favorites', JSON.stringify(favorites));
    updateFavCount();
}

// Обновление счётчика избранного
function updateFavCount() {
    const favCountSpan = document.getElementById('favCount');
    if (favCountSpan) {
        favCountSpan.textContent = favorites.length;
    }
}

// Проверка, в избранном ли картинка
function isFavorite(imageUrl) {
    return favorites.some(fav => fav.url === imageUrl);
}

// Добавление в избранное
function addToFavorites(imageUrl, imageTitle) {
    if (!isFavorite(imageUrl)) {
        favorites.push({ url: imageUrl, title: imageTitle });
        saveFavorites();
        renderFavoritesGrid();
        showToast('❤️ Добавлено в избранное!', false);
        return true;
    }
    return false;
}

// Удаление из избранного
function removeFromFavorites(imageUrl) {
    favorites = favorites.filter(fav => fav.url !== imageUrl);
    saveFavorites();
    renderFavoritesGrid();
    showToast('💔 Удалено из избранного', false);
}

// Переключение избранного
function toggleFavorite(imageUrl, imageTitle, buttonElement) {
    if (isFavorite(imageUrl)) {
        removeFromFavorites(imageUrl);
        if (buttonElement) {
            buttonElement.classList.remove('active');
            buttonElement.innerHTML = '❤️';
        }
    } else {
        addToFavorites(imageUrl, imageTitle);
        if (buttonElement) {
            buttonElement.classList.add('active');
            buttonElement.innerHTML = '💖';
        }
    }
    updateAllFavoriteButtons();
}

// Обновить все кнопки избранного в галерее
function updateAllFavoriteButtons() {
    document.querySelectorAll('.hentai-card').forEach(card => {
        const img = card.querySelector('img');
        const favBtn = card.querySelector('.favorite-icon');
        if (img && favBtn) {
            const url = img.src;
            if (isFavorite(url)) {
                favBtn.classList.add('active');
                favBtn.innerHTML = '💖';
            } else {
                favBtn.classList.remove('active');
                favBtn.innerHTML = '❤️';
            }
        }
    });
}

// Отрисовка сетки избранного
function renderFavoritesGrid() {
    const favoritesGrid = document.getElementById('favoritesGrid');
    const emptyMessage = document.getElementById('emptyFavorites');
    
    if (!favoritesGrid) return;
    
    if (favorites.length === 0) {
        favoritesGrid.innerHTML = '';
        if (emptyMessage) emptyMessage.style.display = 'block';
        return;
    }
    
    if (emptyMessage) emptyMessage.style.display = 'none';
    
    favoritesGrid.innerHTML = '';
    
    favorites.forEach((fav, idx) => {
        const card = document.createElement('div');
        card.className = 'hentai-card';
        card.style.animation = `fadeIn 0.3s ease ${idx * 0.03}s forwards`;
        card.innerHTML = `
            <div class="gallery-item-image">
                <img src="${fav.url}" alt="${fav.title}" loading="lazy">
            </div>
            <div class="gallery-item-info">
                <h3>${fav.title}</h3>
            </div>
        `;
        
        const favBtn = document.createElement('button');
        favBtn.className = 'favorite-icon active';
        favBtn.innerHTML = '💖';
        favBtn.style.zIndex = '10';
        
        favBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            removeFromFavorites(fav.url);
            updateAllFavoriteButtons();
            renderFavoritesGrid();
        });
        
        card.addEventListener('click', (e) => {
            if (!e.target.classList.contains('favorite-icon')) {
                openModal(fav.url, fav.title);
            }
        });
        
        card.appendChild(favBtn);
        favoritesGrid.appendChild(card);
    });
}

// Добавление кнопки избранного на карточку
function addFavoriteButtonToCard(card, imageUrl, imageTitle) {
    const existingBtn = card.querySelector('.favorite-icon');
    if (existingBtn) existingBtn.remove();
    
    const favBtn = document.createElement('button');
    favBtn.className = 'favorite-icon';
    const isFav = isFavorite(imageUrl);
    favBtn.innerHTML = isFav ? '💖' : '❤️';
    if (isFav) favBtn.classList.add('active');
    
    favBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        toggleFavorite(imageUrl, imageTitle, favBtn);
    });
    
    card.style.position = 'relative';
    card.appendChild(favBtn);
}

// Инициализация панели избранного
function initFavoritesPanel() {
    const showBtn = document.getElementById('showFavoritesBtn');
    const panel = document.getElementById('favoritesPanel');
    const closeBtn = document.getElementById('closeFavoritesBtn');
    
    if (showBtn) {
        showBtn.addEventListener('click', () => {
            panel.classList.toggle('open');
            renderFavoritesGrid();
        });
    }
    
    if (closeBtn) {
        closeBtn.addEventListener('click', () => {
            panel.classList.remove('open');
        });
    }
    
    document.addEventListener('click', (e) => {
        if (panel && panel.classList.contains('open')) {
            if (!panel.contains(e.target) && !showBtn.contains(e.target)) {
                panel.classList.remove('open');
            }
        }
    });
}

// Запуск
loadFavorites();
initFavoritesPanel();

setTimeout(() => {
    const cards = document.querySelectorAll('.hentai-card');
    cards.forEach(card => {
        const img = card.querySelector('img');
        const titleEl = card.querySelector('h3');
        if (img && titleEl) {
            addFavoriteButtonToCard(card, img.src, titleEl.textContent);
        }
    });
}, 1000);
</script>
